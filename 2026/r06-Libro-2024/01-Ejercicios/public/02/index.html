<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>htmx CRD</title>
    <link rel="stylesheet" href="/static/02/styles.css">
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
</head>
<body>
    <h1>Perros</h1>
    <form
        hx-post="/dog"
        hx-disabled-elt="#add-btn"
        hx-target="table tbody"
        hx-swap="afterbegin"
        hx-on:htmx:after-request="this.reset()"
    >
        <div>
            <label for="name">Nombre</label>
            <input id="name" name="name" required size="30" type="text" />
        </div>
        <div>
            <label for="breed">Raza</label>
            <input id="breed" name="breed" required size="30" type="text" />
        </div>
        <button id="add-btn">Añadir</button>
    </form>

    <table hx-trigger="revealed" hx-get="/table-rows" hx-target="tbody">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Raza</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</body>
</html>
